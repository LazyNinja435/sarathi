# Keyword substrings (lowercase) → theme labels applied to verses/chunks (lightweight v1 tagging)
keyword_themes:
  - keywords: ["action", "fruit", "duty", "motive", "inaction"]
    themes: ["karma yoga", "duty", "detachment", "action", "fruits of action"]
  - keywords: ["devotion", "bhakti", "love", "faith"]
    themes: ["bhakti yoga", "devotion"]
  - keywords: ["knowledge", "wisdom", "discern", "self"]
    themes: ["jnana yoga", "moksha"]
  - keywords: ["dharma", "righteous", "law"]
    themes: ["dharma", "duty"]
  - keywords: ["desire", "anger", "passion", "lust"]
    themes: ["desire", "anger", "self-control"]
  - keywords: ["fear", "afraid", "tremble"]
    themes: ["fear", "equanimity"]
  - keywords: ["equal", "equanim", "balanced", "steady"]
    themes: ["equanimity", "self-control"]
  - keywords: ["guna", "quality", "nature"]
    themes: ["gunas"]
  - keywords: ["surrender", "abandon", "relinquish"]
    themes: ["surrender", "devotion"]
  - keywords: ["meditat", "contemplat"]
    themes: ["jnana yoga", "self-control"]
  - keywords: ["kurukshetra", "battle", "war", "arrow"]
    themes: ["dharma", "kurukshetra"]
  - keywords: ["krishna", "vasudeva", "madhusudana", "govinda", "hari"]
    themes: ["krishna"]
  - keywords: ["arjuna", "partha", "pandu", "son of kunti"]
    themes: ["arjuna"]

default_entities_gita: ["Krishna", "Arjuna"]
default_entities_mahabharata: ["Krishna", "Arjuna"]
